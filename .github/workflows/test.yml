name: Test

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore tests/SqlExplainer.Core.Tests/SqlExplainer.Core.Tests.csproj

      - name: Build
        run: dotnet build tests/SqlExplainer.Core.Tests/SqlExplainer.Core.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/SqlExplainer.Core.Tests/SqlExplainer.Core.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults
